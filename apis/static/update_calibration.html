        <div class="w-full max-w-3xl mx-auto bg-white rounded-2xl shadow-xl border border-gray-200 p-8 sm:p-10">

            <div class="text-center mb-8">
                 <!-- <h1 class="text-2xl font-bold tracking-tight text-gray-900 sm:text-3xl">Data Calibration Update</h1> -->
                 <p class="mt-2 text-sm leading-6 text-gray-600">Fill in the details below to update the calibration record.</p>
            </div>

            <form id="calibrationForm" novalidate>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6">
                    <div>
                        <label for="standard_equipment_name" class="block text-sm font-semibold leading-6 text-gray-900">Standard Equipment Name</label>
                        <div class="mt-2.5">
                            <input type="text" id="standard_equipment_name" name="standard_equipment_name" class="block w-full rounded-md border-0 px-3.5 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" placeholder="e.g., Fluke 87V" required>
                        </div>
                    </div>

                    <div>
                        <label for="duc_id" class="block text-sm font-semibold leading-6 text-gray-900">DUC ID</label>
                        <div class="mt-2.5">
                            <input type="text" id="duc_id" name="duc_id" class="block w-full rounded-md border-0 px-3.5 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" placeholder="Device Under Calibration ID" required>
                        </div>
                    </div>

                    <div>
                        <label for="duc_range" class="block text-sm font-semibold leading-6 text-gray-900">DUC Range</label>
                        <div class="mt-2.5">
                            <input type="text" id="duc_range" name="duc_range" class="block w-full rounded-md border-0 px-3.5 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" placeholder="e.g., 0-1000V" required>
                        </div>
                    </div>

                    <div>
                        <label for="certificate_number" class="block text-sm font-semibold leading-6 text-gray-900">Certificate Number</label>
                        <div class="mt-2.5">
                            <input type="text" id="certificate_number" name="certificate_number" class="block w-full rounded-md border-0 px-3.5 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" placeholder="CERT-12345" required>
                        </div>
                    </div>

                    <div class="md:col-span-2">
                        <label for="customer_address" class="block text-sm font-semibold leading-6 text-gray-900">Customer Address</label>
                        <div class="mt-2.5">
                            <textarea id="customer_address" name="customer_address" rows="3" class="block w-full rounded-md border-0 px-3.5 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" placeholder="123 Innovation Drive, Tech City" required></textarea>
                        </div>
                    </div>

                    <div>
                        <label for="calibration_done_at" class="block text-sm font-semibold leading-6 text-gray-900">Calibration Done At</label>
                        <div class="mt-2.5">
                            <input type="text" id="calibration_done_at" name="calibration_done_at" class="block w-full rounded-md border-0 px-3.5 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" placeholder="e.g., In-house Lab" required>

                        </div>
                    </div>

                    <div>
                        <label for="calibration_next_due" class="block text-sm font-semibold leading-6 text-gray-900">Next Due Date</label>

                <div id="statusMessage" class="mt-6 text-center text-sm font-medium"></div>

                <div class="mt-8">

                        <span id="buttonText">Update Record</span>
                        <span id="buttonSpinner" class="hidden">
                            <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            Processing...
                        </span>
                    </button>
                </div>
            </form>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Check Login Status ---
            async function checkLogin() {
                try {
                    // Use a relative path for the API call
                    const res = await fetch("/me", {
                        credentials: "include"
                    });

                    if (res.ok) {
                        const data = await res.json();
                        if (data.email) {
                            // Store email and role in localStorage
                            localStorage.setItem('userEmail', data.email);
                            localStorage.setItem('userRole', data.role);
                            console.log("User Logged In:", data.email, "Role:", data.role);
                        } else {
                            console.log("User is not logged in. /me endpoint returned no email.");
                            // You could redirect to a login page here if needed.
                            // window.location.href = '/login';
                        }
                    } else {
                        console.warn("Could not verify login status. Response not OK.", res.status);
                    }
                } catch (err) {
                    console.error("Error checking login status:", err);
                    const statusMessage = document.getElementById('statusMessage');
                    statusMessage.innerHTML = `<p class="text-red-600">Could not connect to the server to verify login status. Please check your connection.</p>`;
                }
            }

            // Run the login check when the page loads
            checkLogin();


            // --- Form Submission Logic ---
            const form = document.getElementById('calibrationForm');
            const statusMessage = document.getElementById('statusMessage');
            const submitButton = document.getElementById('submitButton');
            const buttonText = document.getElementById('buttonText');
            const buttonSpinner = document.getElementById('buttonSpinner');

            form.addEventListener('submit', async (event) => {
                event.preventDefault(); // Prevent default browser submission

                // Clear previous status messages
                statusMessage.innerHTML = '';

                // Check for user email
                const userEmail = localStorage.getItem('userEmail');
                if (!userEmail) {
                    statusMessage.innerHTML = `<p class="text-red-600">Error: User email not found. Please log in again.</p>`;
                    return;
                }

                // Show loading state
                buttonText.classList.add('hidden');
                buttonSpinner.classList.remove('hidden');
                submitButton.disabled = true;

                // Construct URL with query parameters from the form
                const formData = new FormData(form);
                const params = new URLSearchParams();
                for (const [key, value] of formData.entries()) {
                    params.append(key, value);
                }

                const endpoint = `/update_data_calibration?${params.toString()}`;

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });

                    const result = await response.json();

                    if (response.ok && result.status !== "user not logged in" && !result.error) {
                        statusMessage.innerHTML = `<p class="text-green-600">Successfully updated calibration record!</p>`;
                        form.reset(); // Clear the form on success
                    } else {
                        const errorMessage = result.error || result.status || 'An unknown error occurred.';
                        statusMessage.innerHTML = `<p class="text-red-600">Update failed: ${errorMessage}</p>`;
                        console.error("API Error:", result);
                    }
                } catch (error) {
                    statusMessage.innerHTML = `<p class="text-red-600">A network error occurred. Please try again later.</p>`;
                    console.error("Fetch Error:", error);
                } finally {
                    // Restore button state
                    buttonText.classList.remove('hidden');
                    buttonSpinner.classList.add('hidden');
                    submitButton.disabled = false;
                }
            });
        });
    </script>
