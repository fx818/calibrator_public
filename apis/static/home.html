<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Certificate Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .fontsize-xs {
            font-size: 0.7rem;
            /* smaller than fontsize-sm */
        }

        .fontsize-sm {
            font-size: 0.875rem;
            /* current small size */
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        table th {
            text-transform: capitalize;
        }
    </style>
</head>

<body class="bg-gray-100">

    <div class="container mx-auto p-4 sm:p-6 lg:p-8">

        <header
            class="bg-white rounded-2xl shadow-md border border-gray-200 p-6 flex flex-wrap items-center justify-between gap-y-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-gray-900">Dashboard</h1>
                <p class="mt-1 text-md text-gray-500">Overview of certificate data and actions.</p>
            </div>

            <nav class="flex flex-wrap items-center gap-x-5 gap-y-2 text-sm font-semibold">
                <a href="/static/home.html" class="text-blue-600 hover:text-blue-800 transition-colors">Dashboard</a>
                <a href="/static/edit_data.html" class="text-gray-500 hover:text-blue-600 transition-colors">Edit
                    Data</a>
                <a href="/static/pending_data.html" class="text-gray-500 hover:text-blue-600 transition-colors">Pending
                    Data</a>
                <a href="/static/calibration_data.html" class="text-gray-500 hover:text-blue-600 transition-colors">All
                    Records</a>
                <a href="/static/deleted_data.html" class="text-gray-500 hover:text-blue-600 transition-colors">Deleted
                    Records</a>
                <a id="manualUpdateLink" href="#"
                    class="hidden text-gray-500 hover:text-blue-600 transition-colors">Manual Update</a>
                <a href="/" class="text-gray-500 hover:text-blue-600 transition-colors">Profile</a>
                <a href="/static/config_page.html"
                    class="inline-flex items-center gap-x-2 rounded-md bg-gray-100 px-3 py-2 text-gray-700 hover:bg-gray-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.532 1.532 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.532 1.532 0 01-.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
                            clip-rule="evenodd" />
                    </svg>
                    Settings
                </a>
            </nav>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section id="extracted-data-card"
                class="bg-white rounded-2xl shadow-lg border border-gray-200 p-6 md:p-8 flex flex-col">
                <div class="flex items-center justify-between mb-4 flex-shrink-0">
                    <h2 class="text-2xl font-bold text-gray-800">
                        Recent Extraction <span id="recent-extraction-title"></span>
                    </h2>
                    <button id="startNewExtractionBtn"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg text-sm disabled:bg-gray-400 disabled:cursor-not-allowed">
                        Start New Extraction
                    </button>
                </div>
                <div id="extracted-data-content" class="flex-grow">
                </div>
            </section>

            <section id="recent-data-card"
                class="bg-white rounded-2xl shadow-lg border border-gray-200 p-6 md:p-8 flex flex-col">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 flex-shrink-0">
                    Top 10 Recent Records
                </h2>
                <div id="recent-data-content" class="flex-grow">
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- HELPER FUNCTIONS ---

        function createLoadingState(message) {
            return `<div class="flex flex-col items-center justify-center h-full text-center text-gray-500">
                <div class="w-8 h-8 border-4 border-gray-200 border-t-blue-600 rounded-full spinner mx-auto mb-4"></div>
                <p>${message}</p>
            </div>`;
        }

        function createEmptyState(message) {
            return `<div class="flex flex-col items-center justify-center h-full text-center p-10 border-2 border-dashed border-gray-300 rounded-lg text-gray-400">
                <div class="text-4xl mb-2">📋</div>
                <p class="font-semibold">${message}</p>
            </div>`;
        }

        function createRoleBasedTable(data, role) {
            let headers = [];
            let dataKeys = [];

            if (role === 'calibration_manager') {
                headers = ['Cert No.', 'Device ID', 'Device Range', 'Next Due'];
                dataKeys = ['certificate_number', 'duc_id', 'duc_range', 'calibration_next_due'];
            } else if (role === 'warranty_claim_manager') {
                headers = ['Claim No.', 'Claim Date', 'Supplier', 'Qty Rejected'];
                dataKeys = ['warranty_claim_no', 'claim_date', 'supplier_name', 'qty_rejected'];
            } else {
                return createEmptyState("Invalid user role for displaying data.");
            }

            const headerHtml = headers.map(h => `<th class="p-3 text-left font-semibold text-gray-600">${h}</th>`).join('');
            const rowsHtml = data.map(row => {
                const cells = dataKeys.map(key => {
                    let value = row[key] || 'N/A';
                    let statusClass = 'bg-yellow-100 text-yellow-800'; // Default to pending
                    if (value && typeof value === 'string') {
                        if (value.toLowerCase() === 'approved') statusClass = 'bg-green-100 text-green-800';
                        if (value.toLowerCase() === 'pending') statusClass = 'bg-red-100 text-red-800';
                    }
                    if (key === 'approval') {
                        return `<td class="p-3 text-gray-700 whitespace-nowrap"><span class="px-2 py-1 text-xs font-medium rounded-full ${statusClass}">${value}</span></td>`;
                    }
                    return `<td class="p-3 text-gray-700 whitespace-nowrap">${value}</td>`;
                }).join('');
                return `<tr class="border-b border-gray-200 last:border-b-0 hover:bg-gray-50">${cells}</tr>`;
            }).join('');

            return `
                <div class="overflow-x-auto rounded-lg border border-gray-200 max-h-[500px]">
                    <table class="w-full min-w-full text-sm">
                        <thead class="bg-gray-100 sticky top-0">
                            <tr>${headerHtml}</tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            ${rowsHtml}
                        </tbody>
                    </table>
                </div>`;
        }

        function displayApprovalUI(data, role, container) {
            const tableHtml = createRoleBasedTable(data, role);
            container.innerHTML = tableHtml + `
                <div id="approvalSection" class="mt-6 p-6 bg-blue-50 border-l-4 border-blue-500 rounded-r-lg">
                    <h3 class="text-lg font-semibold text-blue-800">Action Required</h3>
                    <p id="approvalMessage" class="text-blue-700 mt-1">Review the data above and approve or edit.</p>
                    <div class="mt-4 flex gap-4">
                        <button id="approveBtn" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-5 rounded-lg">Approve</button>
                        <button id="editBtn" class="bg-gray-600 hover:bg-gray-700 text-white font-semibold py-2 px-5 rounded-lg">Edit</button>
                    </div>
                </div>`;

            document.getElementById('approveBtn').addEventListener('click', () => handleApproval('approve'));
            document.getElementById('editBtn').addEventListener('click', () => handleApproval('edit'));
        }

        // --- ASYNC FUNCTIONS ---

        async function handleApproval(decision) {
            const contentDiv = document.getElementById('extracted-data-content');

            if (decision === "edit") {
                // The required data should already be in localStorage from the last fetch/extraction.
                // We just redirect.
                window.location.href = "/static/edit_data.html";
                return;
            }

            // Handle 'approve'
            try {
                const response = await fetch(`/approval?user_input=yes`, { method: 'POST' });
                const data = await response.json();

                if (data.status === 'Approved') {
                    contentDiv.innerHTML = `<div class="p-4 rounded-lg text-center font-medium bg-green-50 text-green-800">✅ Certificates approved successfully!</div>`;
                    setTimeout(() => {
                        fetchExtractedData();
                        fetchRecentData();
                    }, 2000);
                } else {
                    throw new Error(data.message || 'Approval process failed.');
                }
            } catch (error) {
                document.getElementById('approvalMessage').textContent = `Error: ${error.message}`;
                document.getElementById('approvalMessage').classList.add('text-red-600');
            }
        }

        async function handleExtraction() {
            const btn = document.getElementById('startNewExtractionBtn');
            const contentDiv = document.getElementById('extracted-data-content');
            const userRole = localStorage.getItem('userRole');

            btn.disabled = true;
            btn.innerHTML = 'Extracting...';
            contentDiv.innerHTML = createLoadingState("Extracting new certificates, please wait...");

            try {
                const response = await fetch('/extract_certificates', { method: 'POST' });
                if (!response.ok) throw new Error('Extraction failed on the server.');

                const extractionResult = await response.json();

                // *** ADDED THIS LOGIC BACK IN ***
                // Save the latest extraction results to localStorage for the 'Edit' page.
                // localStorage.setItem('currentCertificates', JSON.stringify(extractionResult.raw_certs || []));
                localStorage.setItem('pdf_url_path', JSON.stringify(extractionResult.pdf_url_path || null));

                if (extractionResult && extractionResult.raw_certs && extractionResult.raw_certs.length > 0) {
                    displayApprovalUI(extractionResult.raw_certs, userRole, contentDiv);
                } else {
                    contentDiv.innerHTML = createEmptyState(extractionResult.message || "Extraction complete, but no new certificates were found.");
                }
            } catch (error) {
                contentDiv.innerHTML = `<div class="p-4 rounded-lg text-center font-medium bg-red-50 text-red-800">❌ Error: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Start New Extraction';
            }
        }

        async function fetchExtractedData() {
            const contentDiv = document.getElementById('extracted-data-content');
            contentDiv.innerHTML = createLoadingState('Checking for data to approve...');
            const userRole = localStorage.getItem('userRole');

            try {
                const response = await fetch('/fetch_scheduler_data');
                const result = await response.json();

                if (result.status === 'found' && result.data && result.data.data) {
                    const scheduledData = JSON.parse(result.data.data);

                    // Also save to localStorage here, so the 'Edit' button works on page load
                    // localStorage.setItem('currentCertificates', JSON.stringify(scheduledData.raw_certs || []));
                    localStorage.setItem('pdf_url_path', JSON.stringify(scheduledData.pdf_url_path || null));

                    if (scheduledData.raw_certs && scheduledData.raw_certs.length > 0) {
                        displayApprovalUI(scheduledData.raw_certs, userRole, contentDiv);
                    } else {
                        contentDiv.innerHTML = createEmptyState("No data is currently awaiting approval.");
                    }
                } else {
                    contentDiv.innerHTML = createEmptyState("No data is currently awaiting approval.");
                }
            } catch (error) {
                console.error("Error fetching scheduled data:", error);
                contentDiv.innerHTML = `<p class="text-red-600">Error loading data: ${error.message}</p>`;
            }
        }

        async function fetchRecentData() {
            const contentDiv = document.getElementById('recent-data-content');
            contentDiv.innerHTML = createLoadingState('Loading recent records...');
            const userRole = localStorage.getItem('userRole');

            try {
                const response = await fetch('/get_calibrated_data', { method: 'POST' });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `Server error: ${response.status}`);
                }
                const result = await response.json();
                const allRecords = result.data || [];
                const top10Records = allRecords.slice(0, 10);

                if (top10Records.length === 0) {
                    contentDiv.innerHTML = createEmptyState("No recent records found.");
                } else {
                    contentDiv.innerHTML = createRoleBasedTable(top10Records, userRole);
                }

            } catch (error) {
                console.error("Error fetching recent data:", error);
                contentDiv.innerHTML = createEmptyState(`Could not load records: ${error.message}`);
            }
        }

        // --- INITIALIZATION ---

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('startNewExtractionBtn').addEventListener('click', handleExtraction);
            const headertitle = document.getElementById('recent-extraction-title');
            const numberOfCerts = localStorage.getItem('currentCertificates') ? JSON.parse(localStorage.getItem('currentCertificates')).length : 0;
            headertitle.textContent = `${numberOfCerts > 0 ? ` (${numberOfCerts} Pending${numberOfCerts > 1 ? 's' : ''})` : ''}`;
            headertitle.classList.add(numberOfCerts > 0 ? 'text-red-600' : 'text-gray-800');
            headertitle.classList.add(numberOfCerts > 0 ? 'font-bold' : 'font-normal');
            headertitle.classList.add(numberOfCerts > 0 ? 'fontsize-sm' : 'fontsize-sm');

            const userRole = localStorage.getItem('userRole');
            if (userRole) {
                const manualUpdateLink = document.getElementById('manualUpdateLink');

                if (userRole === 'calibration_manager') {
                    manualUpdateLink.href = '/static/update_calibration.html';
                    manualUpdateLink.classList.remove('hidden');
                } else if (userRole === 'warranty_claim_manager') {
                    manualUpdateLink.href = '/static/update_warranty.html';
                    manualUpdateLink.classList.remove('hidden');
                }

                fetchExtractedData();
                fetchRecentData();
            } else {
                const msg = createEmptyState('Please log in and set a role to view data.');
                document.getElementById('extracted-data-content').innerHTML = msg;
                document.getElementById('recent-data-content').innerHTML = msg;
            }
        });
    </script>
</body>

</html>
