<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Role Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700">
            <div class="p-6 md:p-8 text-center border-b border-slate-200 dark:border-slate-700">
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Select Your Role</h1>
                <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">Choose your designated role to proceed to the dashboard.</p>
            </div>
            
            <form id="roleForm" class="p-6 md:p-8">
                <div class="mb-6">
                    <label for="roleSelect" class="block text-sm font-medium leading-6 text-slate-900 dark:text-slate-300">Agent Role</label>
                    <select id="roleSelect" required class="mt-2 block w-full rounded-md border-0 px-3 py-2.5 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-200 shadow-sm ring-1 ring-inset ring-slate-300 dark:ring-slate-700 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                        <option value="">-- Select a Role --</option>
                        <option value="calibration_manager">Calibration Manager</option>
                        <option value="warranty_claim_manager">Warranty Claim Manager</option>
                        <option value="maintenance_coordinator">Maintenance Coordinator</option>
                        <option value="inventory_manager">Inventory Manager</option>
                        <option value="quality_assurance">Quality Assurance</option>
                        <option value="customer_support">Customer Support</option>
                    </select>
                </div>
                
                <button type="submit" class="w-full flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-6 rounded-lg disabled:bg-slate-400 disabled:cursor-not-allowed transition-colors" id="submitBtn">
                    Set Role & Continue
                </button>
            </form>
            
            <div class="px-6 md:px-8 pb-6">
                <div id="message" class="hidden"></div>
            </div>
        </div>
        <div class="text-center mt-6">
            <a href="/" class="text-sm font-semibold text-slate-600 dark:text-slate-400 hover:underline">Back to Login</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('roleForm');
        const roleSelect = document.getElementById('roleSelect');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        const API_BASE_URL = "http://127.0.0.1:8000";

        function showMessage(text, type = 'success') {
            const typeMap = {
                success: { bg: 'bg-green-50 dark:bg-green-900/50', text: 'text-green-800 dark:text-green-200' },
                error: { bg: 'bg-red-50 dark:bg-red-900/50', text: 'text-red-800 dark:text-red-200' }
            };
            const config = typeMap[type];
            messageDiv.textContent = text;
            messageDiv.className = `p-4 rounded-lg text-center font-medium text-sm ${config.bg} ${config.text}`;
            messageDiv.classList.remove('hidden');
            
            setTimeout(() => {
                messageDiv.classList.add('hidden');
            }, 5000);
        }

        function showLoading() {
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Setting Role...`;
        }

        function hideLoading() {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Set Role & Continue';
        }

        async function submitRole(selectedRole) {
            try {
                showLoading();
                const url = `${API_BASE_URL}/define_role?role=${encodeURIComponent(selectedRole)}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' },
                    credentials: 'include' // Important for sending session cookies
                });
        
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: `HTTP error! Status: ${response.status}` }));
                    throw new Error(errorData.error || `HTTP error! Status: ${response.status}`);
                }
        
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                if (data.success) {
                    showMessage(data.message || `Role successfully set to: ${selectedRole}`, 'success');
                    if (data.redirect_url) {
                        setTimeout(() => {
                            window.location.href = data.redirect_url;
                        }, 1500);
                    }
                } else {
                    showMessage(data.message || `An unknown issue occurred.`, 'error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage(`Failed to set role: ${error.message}`, 'error');
            } finally {
                hideLoading();
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const selectedRole = roleSelect.value;
            if (!selectedRole) {
                showMessage('Please select a role first!', 'error');
                return;
            }

            await submitRole(selectedRole);
        });

        // Auto-focus the select element
        roleSelect.focus();
        console.log("User email from localStorage:", localStorage.getItem('userEmail'));
        console.log("User role from localStorage:", localStorage.getItem('userRole'));
    </script>
</body>
</html>
