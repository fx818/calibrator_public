        <main id="main-content">
            <!-- Filters Section -->
            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 items-center">

                    <div class="lg:col-span-2">
                        <input type="text" id="search-input" placeholder="Search all fields..."
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="flex justify-start md:justify-end space-x-2">
                        <button id="reset-filters"
                            class="w-full md:w-auto text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Reset
                            Filters</button>
                        <button id="download-csv"
                            class="w-full md:w-auto inline-flex items-center justify-center px-4 py-2 bg-blue-600 text-white font-semibold text-sm rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">

                                xmlns="http://www.w3.org/2000/svg">

                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                            </svg>
                            Download CSV
                        </button>
                    </div>
                </div>
                <div id="dynamic-filters-container"
                    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4 border-t border-gray-200 pt-4">
                    <!-- Role-specific filters will be injected here -->
                </div>
            </div>

            <!-- Main Content Area -->
            <div id="loading-spinner" class="flex items-center justify-center h-64">
                <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500"></div>
            </div>
            <div id="data-container"
                class="hidden bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden"></div>
            <div id="message-container"
                class="hidden text-center p-12 bg-white rounded-lg shadow-sm border border-gray-200"></div>
            <div id="error-container"
                class="hidden text-center p-12 bg-red-50 border border-red-200 rounded-lg shadow-md"></div>

    <script>
        // --- DOM Element References ---
        const ui = {
            loadingSpinner: document.getElementById('loading-spinner'),
            dataContainer: document.getElementById('data-container'),
            messageContainer: document.getElementById('message-container'),
            errorContainer: document.getElementById('error-container'),
            searchInput: document.getElementById('search-input'),
            downloadCsvButton: document.getElementById('download-csv'),
            resetFiltersButton: document.getElementById('reset-filters'),
            dynamicFiltersContainer: document.getElementById('dynamic-filters-container')
        };

        let allFetchedData = [];

        const roleConfig = {
            warranty_claim_manager: {
                fields: ['warranty_claim_no', 'claim_date', 'supplier_name', 'ic_no', 'inspection_by', 'description', 'qty_rejected', 'reason_of_rejection', 'signatories'],
                specificFilter: { key: 'supplier_name', label: 'Supplier' },
                dateFilters: [{ key: 'claim_date', label: 'Claim Date' }]
            },
            calibration_manager: {
                fields: ['standard_equipment_name', 'duc_id', 'duc_range', 'calibration_done_at', 'certificate_number', 'calibration_date_received', 'calibration_next_due'],
                specificFilter: { key: 'standard_equipment_name', label: 'Equipment' },
                dateFilters: [
                    { key: 'calibration_date_received', label: 'Date Received' },
                    { key: 'calibration_next_due', label: 'Next Due Date' }
                ]
            }
        };

        async function fetchPendingData() {
            const userRole = localStorage.getItem('userRole');
            if (!userRole || !roleConfig[userRole]) {
                ui.loadingSpinner.classList.add('hidden');
                displayError("Valid user role not found. Please log in again.");
                return;
            }

            try {
                const response = await fetch('/get_pending_data', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }
                const result = await response.json();
                allFetchedData = result.data || [];
                setupDynamicFilters(userRole);
                applyFilters();
            } catch (error) {
                console.error('Fetch error:', error);
                displayError(error.message);
            } finally {
                ui.loadingSpinner.classList.add('hidden');
            }
        }

        function setupDynamicFilters(userRole) {
            const config = roleConfig[userRole];
            let filtersHTML = '';

            // 1. Specific text filter (Supplier or Equipment)
            if (config.specificFilter && allFetchedData.length > 0) {
                const uniqueValues = [...new Set(allFetchedData.map(item => item[config.specificFilter.key]))].filter(Boolean);
                let options = `<option value="">All ${config.specificFilter.label}s</option>`;
                uniqueValues.forEach(val => options += `<option value="${val}">${val}</option>`);
                filtersHTML += `
                    <div>
                        <label for="specific-filter" class="block text-sm font-medium text-gray-700 mb-1">Filter by ${config.specificFilter.label}</label>
                        <select id="specific-filter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">${options}</select>
                    </div>`;
            } else {
                filtersHTML += '<div></div>'; // Placeholder for grid alignment
            }

            // 2. Date column selector
            if (config.dateFilters && config.dateFilters.length > 0) {
                let dateOptions = '<option value="">Select date column</option>';
                config.dateFilters.forEach(df => dateOptions += `<option value="${df.key}">${df.label}</option>`);
                filtersHTML += `
                    <div>
                        <label for="date-column-filter" class="block text-sm font-medium text-gray-700 mb-1">Filter by Date</label>
                        <select id="date-column-filter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">${dateOptions}</select>
                    </div>`;
            } else {
                filtersHTML += '<div></div>';
            }

            // 3. Date range inputs
            filtersHTML += `
                <div>
                     <label for="start-date" class="block text-sm font-medium text-gray-700 mb-1">Date Range</label>
                     <div class="flex items-center space-x-2">
                        <input type="date" id="start-date" placeholder="Start Date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <span class="text-gray-500">-</span>
                        <input type="date" id="end-date" placeholder="End Date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                     </div>
                </div>`;

            ui.dynamicFiltersContainer.innerHTML = filtersHTML;
            // Add event listeners to new filters
            document.getElementById('specific-filter')?.addEventListener('change', applyFilters);
            document.getElementById('date-column-filter')?.addEventListener('change', applyFilters);
            document.getElementById('start-date')?.addEventListener('input', applyFilters);
            document.getElementById('end-date')?.addEventListener('input', applyFilters);
        }

        function applyFilters() {
            const userRole = localStorage.getItem('userRole');
            if (!allFetchedData || !userRole) return;

            const searchTerm = ui.searchInput.value.toLowerCase();
            const specificFilterValue = document.getElementById('specific-filter')?.value;
            const dateColumn = document.getElementById('date-column-filter')?.value;
            const startDate = document.getElementById('start-date')?.value;
            const endDate = document.getElementById('end-date')?.value;

            const filteredData = allFetchedData.filter(row => {
                // General search filter
                const searchMatch = searchTerm ? Object.values(row).some(val => String(val).toLowerCase().includes(searchTerm)) : true;

                // Role-specific text filter
                const specificFilterKey = roleConfig[userRole].specificFilter.key;
                const specificMatch = !specificFilterValue || row[specificFilterKey] === specificFilterValue;

                // Date range filter
                let dateMatch = true;
                if (dateColumn && startDate && endDate) {
                    const rowDateStr = row[dateColumn];
                    if (rowDateStr) {
                        const rowDate = new Date(rowDateStr);
                        dateMatch = rowDate >= new Date(startDate) && rowDate <= new Date(endDate);
                    } else {
                        dateMatch = false;
                    }
                }

                return searchMatch && specificMatch && dateMatch;
            });

            if (filteredData.length > 0) {
                renderTable(filteredData, userRole);
                ui.dataContainer.classList.remove('hidden');
                ui.messageContainer.classList.add('hidden');
            } else {
                displayMessage("No Pending Items Found", "There are currently no items that require your approval, or none that match your filters.");
                ui.dataContainer.classList.add('hidden');
            }
        }

        function renderTable(data, userRole) {
            const tableHeaders = roleConfig[userRole].fields;
            const headerHTML = tableHeaders.map(h => `<th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">${h.replace(/_/g, ' ')}</th>`).join('');

            const rowsHTML = data.map(row => `
                <tr>
                    ${tableHeaders.map(header => `<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">${row[header] || 'N/A'}</td>`).join('')}
                    
                </tr>`).join('');

            ui.dataContainer.innerHTML = `
                <div class="overflow-x-auto">
                    <table class="min-w-full">
                        <thead class="bg-gray-50"><tr>${headerHTML}<th class="px-6 py-3"></th></tr></thead>
                        <tbody class="bg-white divide-y divide-gray-200">${rowsHTML}</tbody>
                    </table>
                </div>`;
        }

        function downloadCSV() {
            // CSV download logic (can be implemented based on current filtered data)
            console.log("Download CSV clicked");
        }

        function displayMessage(title, text) {
            ui.messageContainer.innerHTML = `<h3 class="text-xl font-medium text-gray-700">${title}</h3><p class="text-gray-500 mt-2">${text}</p>`;
            ui.messageContainer.classList.remove('hidden');
        }

        function displayError(message) {
            ui.errorContainer.innerHTML = `<h3 class="text-xl font-medium text-red-700">An Error Occurred</h3><p class="text-red-600 mt-2">${message}</p><a href="/login" class="mt-4 inline-block bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-600">Go to Login</a>`;
            ui.errorContainer.classList.remove('hidden');
        }

        async function updateItemStatus(id, status) {
            console.log(`${status} item with ID: ${id}`);
            alert(`Item ${id} has been ${status}. The table will now refresh.`);
            ui.loadingSpinner.classList.remove('hidden');
            ui.dataContainer.classList.add('hidden');
            await fetchPendingData();
        }

        function handleApprove(id) { updateItemStatus(id, 'approved'); }
        function handleReject(id) { updateItemStatus(id, 'rejected'); }

        // --- Event Listeners ---
        ui.searchInput.addEventListener('input', applyFilters);
        ui.downloadCsvButton.addEventListener('click', downloadCSV);
        ui.resetFiltersButton.addEventListener('click', () => {
            ui.searchInput.value = '';
            const specificFilter = document.getElementById('specific-filter');
            const dateColumnFilter = document.getElementById('date-column-filter');
            const startDate = document.getElementById('start-date');
            const endDate = document.getElementById('end-date');

            if (specificFilter) specificFilter.value = '';
            if (dateColumnFilter) dateColumnFilter.value = '';
            if (startDate) startDate.value = '';
            if (endDate) endDate.value = '';

            applyFilters();
        });

        // --- Initial Load ---
        document.addEventListener('DOMContentLoaded', fetchPendingData);
        document.addEventListener('DOMContentLoaded', () => {

            const role = localStorage.getItem('userRole');
            if (role) {
                const manualUpdateLink = document.getElementById('manualUpdateLink');

                if (role === 'calibration_manager') {
                    manualUpdateLink.href = '/static/update_calibration.html';
                    manualUpdateLink.classList.remove('hidden');
                } else if (role === 'warranty_claim_manager') {
                    manualUpdateLink.href = '/static/update_warranty.html';
                    manualUpdateLink.classList.remove('hidden');
                }

                fetchExtractedData();
                fetchRecentData();
            } else {
                const msg = createEmptyState('Please log in and set a role to view data.');
                document.getElementById('extracted-data-content').innerHTML = msg;
                document.getElementById('recent-data-content').innerHTML = msg;
            }
        });
    </script>
