<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Approvals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        input[type="date"]:not(:valid):before {
            content: attr(placeholder);
            color: #9ca3af;
        }
    </style>
</head>

<body class="text-gray-800">

    <div class="container mx-auto p-4 sm:p-6 lg:p-8">
        <header
            class="bg-white rounded-2xl shadow-md border border-gray-200 p-6 flex flex-wrap items-center justify-between gap-y-4 mb-8">
            <div>
                <h1 id="pageTitle" class="text-3xl font-bold tracking-tight text-gray-900">Pending Approvals</h1>
                <p class="mt-1 text-md text-gray-500">Review and approve or reject pending items.</p>
            </div>
            <nav class="flex flex-wrap items-center gap-x-5 gap-y-2 text-sm font-semibold">
                <a href="/static/home.html" class="text-gray-500 hover:text-blue-800 transition-colors">Dashboard</a>
                <a href="/static/edit_data.html" class="text-gray-500 hover:text-blue-600 transition-colors">Edit Data</a>
                <a href="/static/pending_data.html" class="text-blue-600 hover:text-blue-600 transition-colors">Pending Data</a>
                <a href="/static/calibration_data.html" class="text-gray-500 hover:text-blue-600 transition-colors">All Records</a>
                <a href="/static/deleted_data.html" class="text-gray-500 hover:text-blue-600 transition-colors">Deleted Records</a>
                <a id="manualUpdateLink" href="#" class="hidden text-gray-500 hover:text-blue-600 transition-colors">Manual Update</a>
                <a href="/" class="text-gray-500 hover:text-blue-600 transition-colors">Profile</a>
                <a href="/static/config_page.html" class="inline-flex items-center gap-x-2 rounded-md bg-gray-100 px-3 py-2 text-gray-700 hover:bg-gray-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.532 1.532 0 012.287-.947c1.372.836 2.942-.734-2.106-2.106a1.532 1.532 0 01-.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" /></svg>
                    Settings
                </a>
            </nav>
        </header>

        <main id="main-content">
            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 items-center">
                    <h3 class="text-lg font-semibold text-gray-800 col-span-1 md:col-span-2 lg:col-span-3">Filters</h3>
                    <div class="lg:col-span-2">
                        <input type="text" id="search-input" placeholder="Search all fields..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="flex justify-start md:justify-end space-x-2">
                        <button id="reset-filters" class="w-full md:w-auto text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Reset Filters</button>
                        <button id="download-csv" class="w-full md:w-auto inline-flex items-center justify-center px-4 py-2 bg-blue-600 text-white font-semibold text-sm rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Download CSV
                        </button>
                    </div>
                </div>
                <div id="dynamic-filters-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4 border-t border-gray-200 pt-4"></div>
            </div>

            <div id="loading-spinner" class="flex items-center justify-center h-64">
                <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500"></div>
            </div>
            <div id="data-container" class="hidden bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden"></div>
            <div id="message-container" class="hidden text-center p-12 bg-white rounded-lg shadow-sm border border-gray-200"></div>
            <div id="error-container" class="hidden text-center p-12 bg-red-50 border border-red-200 rounded-lg shadow-md"></div>
        </main>
    </div>

    <script>
        const ui = {
            loadingSpinner: document.getElementById('loading-spinner'),
            dataContainer: document.getElementById('data-container'),
            messageContainer: document.getElementById('message-container'),
            errorContainer: document.getElementById('error-container'),
            searchInput: document.getElementById('search-input'),
            downloadCsvButton: document.getElementById('download-csv'),
            resetFiltersButton: document.getElementById('reset-filters'),
            dynamicFiltersContainer: document.getElementById('dynamic-filters-container')
        };

        let allFetchedData = [];
        let currentlyDisplayedData = [];

        const roleConfig = {
            warranty_claim_manager: {
                approveEndpoint: '/update_data_warranty',
                idField: 'warranty_claim_no',
                endpointParams: ['warranty_claim_no', 'claim_date', 'supplier_name', 'supplier_address', 'ic_no', 'inspection_by', 'description', 'qty_rejected', 'reason_of_rejection', 'signatories'],
                fields: ['warranty_claim_no', 'claim_date', 'supplier_name', 'ic_no', 'inspection_by', 'description', 'qty_rejected', 'reason_of_rejection', 'signatories'],
                specificFilter: { key: 'supplier_name', label: 'Supplier' },
                dateFilters: [{ key: 'claim_date', label: 'Claim Date' }]
            },
            calibration_manager: {
                approveEndpoint: '/update_data_calibration',
                idField: 'duc_id',
                endpointParams: ['standard_equipment_name', 'duc_id', 'duc_range', 'customer_address', 'calibration_done_at', 'certificate_number', 'calibration_date_received', 'calibration_next_due'],
                fields: ['standard_equipment_name', 'duc_id', 'duc_range', 'calibration_done_at', 'certificate_number', 'calibration_date_received', 'calibration_next_due'],
                specificFilter: { key: 'standard_equipment_name', label: 'Equipment' },
                dateFilters: [
                    { key: 'calibration_date_received', label: 'Date Received' },
                    { key: 'calibration_next_due', label: 'Next Due Date' }
                ]
            }
        };

        async function fetchPendingData() {
            const userRole = localStorage.getItem('userRole');
            if (!userRole || !roleConfig[userRole]) {
                ui.loadingSpinner.classList.add('hidden');
                displayError("Valid user role not found. Please log in again.");
                return;
            }
            try {
                const response = await fetch('/get_pending_data', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }
                const result = await response.json();
                allFetchedData = result.data || [];
                setupDynamicFilters(userRole);
                applyFilters();
            } catch (error) {
                console.error('Fetch error:', error);
                displayError(error.message);
            } finally {
                ui.loadingSpinner.classList.add('hidden');
            }
        }

        function setupDynamicFilters(userRole) {
            const config = roleConfig[userRole];
            let filtersHTML = '';
            if (config.specificFilter && allFetchedData.length > 0) {
                const uniqueValues = [...new Set(allFetchedData.map(item => item[config.specificFilter.key]))].filter(Boolean);
                let options = `<option value="">All ${config.specificFilter.label}s</option>`;
                uniqueValues.forEach(val => options += `<option value="${val}">${val}</option>`);
                filtersHTML += `<div><label for="specific-filter" class="block text-sm font-medium text-gray-700 mb-1">Filter by ${config.specificFilter.label}</label><select id="specific-filter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">${options}</select></div>`;
            } else { filtersHTML += '<div></div>'; }
            if (config.dateFilters && config.dateFilters.length > 0) {
                let dateOptions = '<option value="">Select date column</option>';
                config.dateFilters.forEach(df => dateOptions += `<option value="${df.key}">${df.label}</option>`);
                filtersHTML += `<div><label for="date-column-filter" class="block text-sm font-medium text-gray-700 mb-1">Filter by Date</label><select id="date-column-filter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">${dateOptions}</select></div>`;
            } else { filtersHTML += '<div></div>'; }
            filtersHTML += `<div><label for="start-date" class="block text-sm font-medium text-gray-700 mb-1">Date Range</label><div class="flex items-center space-x-2"><input type="date" id="start-date" placeholder="Start Date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"><span class="text-gray-500">-</span><input type="date" id="end-date" placeholder="End Date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></div></div>`;
            ui.dynamicFiltersContainer.innerHTML = filtersHTML;
            document.getElementById('specific-filter')?.addEventListener('change', applyFilters);
            document.getElementById('date-column-filter')?.addEventListener('change', applyFilters);
            document.getElementById('start-date')?.addEventListener('input', applyFilters);
            document.getElementById('end-date')?.addEventListener('input', applyFilters);
        }

        function applyFilters() {
            const userRole = localStorage.getItem('userRole');
            if (!allFetchedData || !userRole) return;
            const searchTerm = ui.searchInput.value.toLowerCase();
            const specificFilterValue = document.getElementById('specific-filter')?.value;
            const dateColumn = document.getElementById('date-column-filter')?.value;
            const startDate = document.getElementById('start-date')?.value;
            const endDate = document.getElementById('end-date')?.value;
            const filteredData = allFetchedData.filter(row => {
                const searchMatch = searchTerm ? Object.values(row).some(val => String(val).toLowerCase().includes(searchTerm)) : true;
                const specificFilterKey = roleConfig[userRole].specificFilter.key;
                const specificMatch = !specificFilterValue || row[specificFilterKey] === specificFilterValue;
                let dateMatch = true;
                if (dateColumn && startDate && endDate) {
                    const rowDateStr = row[dateColumn];
                    if (rowDateStr) {
                        try {
                            const [day, month, year] = rowDateStr.split('/');
                            const rowDate = new Date(`${year}-${month}-${day}`);
                            dateMatch = rowDate >= new Date(startDate) && rowDate <= new Date(endDate);
                        } catch(e) { dateMatch = false; }
                    } else { dateMatch = false; }
                }
                return searchMatch && specificMatch && dateMatch;
            });
            currentlyDisplayedData = filteredData;
            if (filteredData.length > 0) {
                renderTable(filteredData, userRole);
                ui.dataContainer.classList.remove('hidden');
                ui.messageContainer.classList.add('hidden');
            } else {
                displayMessage("No Pending Items Found", "There are currently no items that require your approval, or none that match your filters.");
                ui.dataContainer.classList.add('hidden');
            }
        }

        function renderTable(data, userRole) {
            const tableHeaders = roleConfig[userRole].fields;
            const headerHTML = tableHeaders.map(h => `<th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">${h.replace(/_/g, ' ')}</th>`).join('');
            const rowsHTML = data.map((row, index) => `
                <tr>
                    ${tableHeaders.map(header => `<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">${row[header] || 'N/A'}</td>`).join('')}
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-4"><button onclick="handleApprove(${index})" class="text-green-600 hover:text-green-900 font-semibold transition-colors">Approve</button><button onclick="handleReject(${index})" class="text-red-600 hover:text-red-900 font-semibold transition-colors">Reject</button></td>
                </tr>`).join('');
            ui.dataContainer.innerHTML = `<div class="overflow-x-auto"><table class="min-w-full"><thead class="bg-gray-50"><tr>${headerHTML}<th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th></tr></thead><tbody class="bg-white divide-y divide-gray-200">${rowsHTML}</tbody></table></div>`;
        }

        async function updateItemStatus(rowIndex, approvalStatus) {
            const userRole = localStorage.getItem('userRole');
            const config = roleConfig[userRole];
            const rowData = currentlyDisplayedData[rowIndex];
            if (!config || !rowData) {
                displayError("Could not process the request. Role or data not found.");
                return;
            }
            console.log(`Sending request to ${config.approveEndpoint} with status '${approvalStatus}'.`);

            // --- THIS IS THE CORRECTED LOGIC, MATCHING YOUR WORKING "EDIT" PAGE ---

            // 1. Create a URLSearchParams object to build the query string.
            const params = new URLSearchParams();
            const requiredParams = config.endpointParams;

            // 2. Add all parameters from the row's data to the object.
            requiredParams.forEach(param => {
                let value = rowData[param];
                if (value === null || value === undefined) {
                    value = '';
                }
                // Reformat dates from DD/MM/YYYY to YYYY-MM-DD
                if ((param.includes('_date') || param.includes('_due')) && typeof value === 'string' && value.split('/').length === 3) {
                    const parts = value.split('/');
                    value = `${parts[2]}-${parts[1]}-${parts[0]}`;
                }
                params.append(param, String(value));
            });
            // Also append the approval status from the button click
            params.append('approval', approvalStatus);

            // 3. Construct the final URL with the query string attached.
            const urlWithParams = `${config.approveEndpoint}?${params.toString()}`;
            console.log("Final URL for POST request:", urlWithParams);

            try {
                // 4. Make the POST request to the full URL, with NO BODY.
                const response = await fetch(urlWithParams, { 
                    method: 'POST',
                    headers: { 'Accept': 'application/json' }
                });
                
                const result = await response.json();
                if (!response.ok) {
                    const errorMsg = result.detail ? JSON.stringify(result.detail) : `Server responded with status ${response.status}`;
                    throw new Error(errorMsg);
                }
                alert(`Item has been successfully ${approvalStatus}. The table will now refresh.`);
                ui.loadingSpinner.classList.remove('hidden');
                ui.dataContainer.innerHTML = '';
                ui.dataContainer.classList.add('hidden');
                await fetchPendingData();
            } catch (error) {
                console.error('Update error:', error);
                displayError(`Failed to update item: ${error.message}`);
            }
        }

        function handleApprove(index) { updateItemStatus(index, 'approved'); }
        function handleReject(index) { updateItemStatus(index, 'rejected'); }
        function handleViewDetails(index) {
            const rowData = currentlyDisplayedData[index];
            let detailsString = 'Record Details:\n\n';
            for (const [key, value] of Object.entries(rowData)) {
                const formattedKey = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                detailsString += `${formattedKey}: ${value || 'N/A'}\n`;
            }
            alert(detailsString);
        }

        function downloadCSV() {
            console.log("Download CSV clicked");
            alert("CSV Download functionality is not yet implemented.");
        }

        function displayMessage(title, text) {
            ui.messageContainer.innerHTML = `<h3 class="text-xl font-medium text-gray-700">${title}</h3><p class="text-gray-500 mt-2">${text}</p>`;
            ui.messageContainer.classList.remove('hidden');
        }

        function displayError(message) {
            ui.errorContainer.innerHTML = `<h3 class="text-xl font-medium text-red-700">An Error Occurred</h3><p class="text-red-600 mt-2">${message}</p><a href="/login" class="mt-4 inline-block bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-600">Go to Login</a>`;
            ui.errorContainer.classList.remove('hidden');
            ui.dataContainer.classList.add('hidden');
            ui.messageContainer.classList.add('hidden');
        }

        ui.searchInput.addEventListener('input', applyFilters);
        ui.downloadCsvButton.addEventListener('click', downloadCSV);
        ui.resetFiltersButton.addEventListener('click', () => {
            ui.searchInput.value = '';
            const specificFilter = document.getElementById('specific-filter');
            const dateColumnFilter = document.getElementById('date-column-filter');
            const startDate = document.getElementById('start-date');
            const endDate = document.getElementById('end-date');
            if (specificFilter) specificFilter.value = '';
            if (dateColumnFilter) dateColumnFilter.value = '';
            if (startDate) startDate.value = '';
            if (endDate) endDate.value = '';
            applyFilters();
        });

        document.addEventListener('DOMContentLoaded', () => {
            fetchPendingData();
            const role = localStorage.getItem('userRole');
            if (role) {
                const manualUpdateLink = document.getElementById('manualUpdateLink');
                if (role === 'calibration_manager') {
                    manualUpdateLink.href = '/static/update_calibration.html';
                    manualUpdateLink.classList.remove('hidden');
                } else if (role === 'warranty_claim_manager') {
                    manualUpdateLink.href = '/static/update_warranty.html';
                    manualUpdateLink.classList.remove('hidden');
                }
            }
        });
    </script>
</body>
</html>
