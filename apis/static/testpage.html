<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5; /* A softer background */
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px; /* Wider for two columns */
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 30px;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .section h2 {
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- NEW LAYOUT STYLES --- */
        #main-view-container {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }

        #pdf-panel, #data-panel {
            flex: 1;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-width: 0; /* Prevents flex items from overflowing */
        }

        #data-panel {
            max-height: 80vh;
            overflow-y: auto;
        }

        .panel-header {
            font-size: 1.2rem;
            font-weight: 600;
            color: #334155;
            padding-bottom: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        #pdfContainer {
            flex-grow: 1; /* Allows iframe to fill available space */
        }

        #pdfContainer iframe {
            width: 100%;
            height: 100%; /* Fills the container */
            min-height: 700px; /* Ensures a minimum height */
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        /* --- UPDATED APPROVAL SECTION --- */
        .approval-section {
            background: #f8fafc;
            border-top: 2px solid #e2e8f0;
            border-radius: 0;
            padding: 25px;
            text-align: center;
            margin-top: 30px;
        }
        
        .approval-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }

        .approval-section h3 {
             color: #1e293b;
             margin-bottom: 5px;
        }
        /* --- END NEW STYLES --- */

        .btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer;
            font-size: 1rem; font-weight: 600; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-success:hover { box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4); }
        
        .status-message { padding: 15px; border-radius: 10px; margin: 20px 0; font-weight: 500; text-align: center; }
        .status-waiting { background: #fef3c7; color: #92400e; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-error { background: #fee2e2; color: #991b1b; }

        .certificate-grid {
            display: flex; /* Changed from grid to flex for a cleaner single column in the panel */
            flex-direction: column;
            gap: 20px;
        }

        .certificate-card {
            background: white; border-radius: 12px; padding: 20px;
            border: 1px solid #e2e8f0; transition: all 0.3s ease;
        }
        .certificate-card:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.07); }
        .certificate-number { font-weight: 700; color: #4f46e5; font-size: 1.1rem; margin-bottom: 10px; }
        .certificate-status { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }

        .data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .data-table th { background: #4f46e5; color: white; font-weight: 600; }
        .data-table tr:hover { background: #f8fafc; }

        .loading { text-align: center; padding: 40px; }
        .spinner { border: 4px solid #e2e8f0; border-top: 4px solid #4f46e5; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .icon { font-size: 1.2rem; }
        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
        .empty-state .icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.3; }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Certificate Management System</h1>
            <p>Extract, approve, and manage your certificates seamlessly</p>
        </div>

        <div class="content">
            <div class="section">
                <h2><span class="icon">🔍</span>Extract Certificates</h2>
                <button id="extractBtn" class="btn">Extract Certificates</button>

                <div id="extractStatus"></div>

                <div id="main-view-container" style="display: none;">
                    
                    <div id="pdf-panel">
                        <h3 class="panel-header">📄 Document Viewer</h3>
                        <div id="pdfContainer"></div>
                    </div>
                    
                    <div id="data-panel">
                        <h3 class="panel-header">✨ Extracted Data</h3>
                        <div id="extractedCertificates"></div>
                    </div>
                </div>

                <div id="approvalSection" class="approval-section" style="display: none;">
                    <h3>📋 Approval Required</h3>
                    <p id="approvalMessage">Waiting for your approval...</p>
                    <div class="approval-buttons">
                        <button id="approveBtn" class="btn btn-success">✅ Approve</button>
                        <button id="rejectBtn" class="btn btn-danger">❌ Reject</button>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2><span class="icon">📊</span>Calibrated Certificates</h2>
                <button id="loadDataBtn" class="btn">Load Calibrated Data</button>
                <div id="calibratedData"></div>
            </div>
        </div>
    </div>

    <script>
        let currentCertificates = [];
        let calibratedDataCache = [];

        console.log('Current origin:', window.location.origin);
        console.log('Current URL:', window.location.href);

        // Extract Certificates
        document.getElementById('extractBtn').addEventListener('click', async () => {
            const btn = document.getElementById('extractBtn');
            const statusDiv = document.getElementById('extractStatus');
            const approvalSection = document.getElementById('approvalSection');
            const mainView = document.getElementById('main-view-container'); // NEW: Get reference to main layout

            // Reset UI
            btn.disabled = true;
            btn.textContent = 'Extracting...';
            statusDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Extracting certificates...</p></div>';
            mainView.style.display = 'none'; // NEW: Hide main layout
            approvalSection.style.display = 'none';
            document.getElementById('pdfContainer').innerHTML = '';
            document.getElementById('extractedCertificates').innerHTML = '';


            try {
                const response = await fetch('http://127.0.0.1:8000/extract_certificates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    mode: 'cors'
                });

                const data = await response.json();

                if (data.status === 'Waiting') {
                    statusDiv.innerHTML = `<div class="status-message status-waiting">⏳ ${data.message}</div>`;
                    currentCertificates = data.raw_certs || [];
                    
                    mainView.style.display = 'flex'; // NEW: Show main layout
                    approvalSection.style.display = 'block';
                    document.getElementById('approvalMessage').textContent = data.message;
                    
                    // --- This part is now separated ---
                    // 1. Display the extracted data cards
                    displayCertificates(currentCertificates);
                    
                    // 2. Display the PDF
                    const pdf_url_path = data.pdf_url_path || [];
                    const pdfContainer = document.getElementById('pdfContainer');
                    let pdfHtmlContent = '';
                    for (const url of pdf_url_path) {
                        pdfHtmlContent += `
                            <iframe src="${url}" style="border: none;" title="PDF Document">
                                <p>Your browser does not support iframes. Please <a href="${url}">download the PDF</a> to view it.</p>
                            </iframe><br/><br/>
                        `;
                    }
                    pdfContainer.innerHTML = pdfHtmlContent;

                } else if (data.status === 'Completed') {
                    statusDiv.innerHTML = `<div class="status-message status-completed">✅ ${data.message}</div>`;
                    currentCertificates = data.raw_certs || [];
                    
                    mainView.style.display = 'flex'; // NEW: Show main layout
                    approvalSection.style.display = 'none';
                    displayCertificates(currentCertificates);
                     
                    // Also display PDF if available, even on completion
                    const pdf_url_path = data.pdf_url_path || [];
                    const pdfContainer = document.getElementById('pdfContainer');
                    let pdfHtmlContent = '';
                    for (const url of pdf_url_path) {
                        pdfHtmlContent += `
                            <iframe src="${url}" style="border: none;" title="PDF Document">
                                <p>Your browser does not support iframes. Please <a href="${url}">download the PDF</a> to view it.</p>
                            </iframe><br/><br/>
                        `;
                    }
                    pdfContainer.innerHTML = pdfHtmlContent;

                } else if (data.status === 'Error') {
                    statusDiv.innerHTML = `<div class="status-message status-error">❌ ${data.message}</div>`;
                }

            } catch (error) {
                statusDiv.innerHTML = `<div class="status-message status-error">❌ Error: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Extract Certificates';
            }
        });

        // Approval handlers
        document.getElementById('approveBtn').addEventListener('click', () => handleApproval('yes'));
        document.getElementById('rejectBtn').addEventListener('click', () => handleApproval('no'));

        async function handleApproval(decision) {
            const approvalSection = document.getElementById('approvalSection');
            const statusDiv = document.getElementById('extractStatus');

            try {
                const response = await fetch(`http://127.0.0.1:8000/approval?user_input=${decision}`, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' },
                    mode: 'cors'
                });
                const data = await response.json();

                if (data.status === 'Approved') {
                    statusDiv.innerHTML = `<div class="status-message status-completed">✅ Certificates approved successfully!</div>`;
                    approvalSection.style.display = 'none';
                } else if (data.status === 'Rejected') {
                    statusDiv.innerHTML = `<div class="status-message status-error">❌ ${data.message}</div>`;
                    approvalSection.style.display = 'none';
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status-message status-error">❌ Approval error: ${error.message}</div>`;
            }
        }
        
        // --- ALL ORIGINAL FUNCTIONS BELOW ARE PRESERVED EXACTLY AS YOU PROVIDED ---

        function renderCalibrationCard(cert) {
            const statusClass = cert.status ? `status-${cert.status.toLowerCase()}` : 'status-pending';
            return `
                <div class="certificate-card">
                    <div class="certificate-number">Certificate #${cert.certificate_number || 'Unknown'}</div>
                    <div class="certificate-status ${statusClass}">${cert.status || 'pending'}</div>
                    
                    <div style="margin-top: 15px; font-size: 0.9rem;">
                        <div style="margin-bottom: 8px;"><strong>Issue Date:</strong> ${cert.issue_date || 'N/A'}</div>
                        <div style="margin-bottom: 8px;"><strong>Customer:</strong> ${cert.customer_name || 'N/A'}</div>
                        
                        <div style="margin: 15px 0; padding: 10px; background: #f1f5f9; border-radius: 8px;">
                            <strong>Device Under Calibration (DUC):</strong><br>
                            <div style="margin-left: 10px; margin-top: 5px;">
                                ID: ${cert.duc_id || 'N/A'}<br>
                                Serial: ${cert.duc_serial_number || 'N/A'}<br>
                                Make/Model: ${cert.duc_make_model || 'N/A'}<br>
                            </div>
                        </div>
                        
                        <div style="margin: 15px 0; padding: 10px; background: #ecfdf5; border-radius: 8px;">
                            <strong>Calibration Details:</strong><br>
                            <div style="margin-left: 10px; margin-top: 5px;">
                                Date: ${cert.calibration_date || 'N/A'}<br>
                                Next Due: ${cert.calibration_next_due || 'N/A'}<br>
                            </div>
                        </div>
                        
                        <div style="margin: 15px 0; padding: 10px; background: #fef3c7; border-radius: 8px;">
                            <strong>Standard Equipment:</strong><br>
                            <div style="margin-left: 10px; margin-top: 5px;">
                                ID: ${cert.standard_equipment_id || 'N/A'}<br>
                                Name: ${cert.standard_equipment_name || 'N/A'}<br>
                                Serial: ${cert.standard_equipment_serial_number || 'N/A'}<br>
                                Cert #: ${cert.standard_equipment_certificate_number || 'N/A'}<br>
                            </div>
                        </div>
                        
                        
                    </div>
                </div>
            `;
        }

        function renderWarrantyCard(claim) {
            const statusClass = claim.status ? `status-${claim.status.toLowerCase()}` : 'status-pending';
            return `
                <div class="certificate-card">
                    <div class="certificate-number">Warranty Claim #${claim.warranty_claim_no || 'Unknown'}</div>
                    <div class="certificate-status ${statusClass}">${claim.status || 'pending'}</div>

                    <div style="margin-top: 15px; font-size: 0.9rem;">
                        <div style="margin-bottom: 8px;"><strong>Claim Date:</strong> ${claim.claim_date || 'N/A'}</div>
                        <div style="margin-bottom: 8px;"><strong>PO No:</strong> ${claim.po_contract_no || 'N/A'}</div>
                        <div style="margin-bottom: 8px;"><strong>Supplier:</strong> ${claim.supplier_name || 'N/A'}</div>
                        
                        <div style="margin: 15px 0; padding: 10px; background: #f1f5f9; border-radius: 8px;">
                            <strong>Product Details:</strong><br>
                            <div style="margin-left: 10px; margin-top: 5px;">
                                Description: ${claim.description || 'N/A'}<br>
                                Make/Brand: ${claim.make_brand || 'N/A'}<br>
                                Batch/Sl. No.: ${claim.batch_product_slno || 'N/A'}<br>
                                Warranty Period: ${claim.warranty_period || 'N/A'}
                            </div>
                        </div>

                        <div style="margin: 15px 0; padding: 10px; background: #ecfdf5; border-radius: 8px;">
                            <strong>Rejection Details:</strong><br>
                            <div style="margin-left: 10px; margin-top: 5px;">
                                Qty Rejected: ${claim.qty_rejected || 'N/A'}<br>
                                Reason: ${claim.reason_of_rejection || 'N/A'}
                            </div>
                        </div>
                        
                        <div style="margin: 15px 0; padding: 10px; background: #fef3c7; border-radius: 8px;">
                            <strong>Financials:</strong><br>
                            <div style="margin-left: 10px; margin-top: 5px;">
                                Rate per Unit: ${claim.rate_per_unit || 'N/A'}<br>
                                Claim Amount: ${claim.claim_amount || 'N/A'}<br>
                                Recovery Advice: ${claim.recovery_advice || 'N/A'}
                            </div>
                        </div>

                        <div style="margin-top: 15px;">
                            <div style="margin-bottom: 5px;"><strong>Remarks:</strong> ${claim.remarks || 'None'}</div>
                        </div>
                        
                        ${claim.signatories ? `
                        <div style="margin-top: 10px; padding: 8px; background: #e0e7ff; border-radius: 8px; font-size: 0.8rem;">
                            <strong>Signatories:</strong><br>
                            <div style="margin-top: 5px; white-space: pre-line;">${claim.signatories}</div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function displayCertificates(certificates) {
            const container = document.getElementById('extractedCertificates');
            if (!certificates || certificates.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No certificates found</p></div>';
                return;
            }
            const certificateCardsHtml = certificates.map(cert => {
                if (cert.intent === 'calibration_certificate') {
                    return renderCalibrationCard(cert);
                } else if (cert.intent === 'Warranty_claim') {
                    return renderWarrantyCard(cert);
                }
                return '';
            }).join('');
            container.innerHTML = `
                <h3 style="margin-bottom: 20px; color: #334155;">Extracted Certificates (${certificates.length})</h3>
                <div class="certificate-grid">
                    ${certificateCardsHtml}
                </div>
            `;
        }

        // Load Calibrated Data
        document.getElementById('loadDataBtn').addEventListener('click', async () => {
            const btn = document.getElementById('loadDataBtn');
            const dataDiv = document.getElementById('calibratedData');

            btn.disabled = true;
            btn.textContent = 'Loading...';
            dataDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading data...</p></div>';

            try {
                const response = await fetch('http://127.0.0.1:8000/get_calibrated_data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    mode: 'cors'
                });
                const result = await response.json();
                calibratedDataCache = result.data || [];
                console.log(result)

                // --- NEW: Role-based logic to call the correct function ---
                const role = localStorage.getItem("userRole");
                if (role === "warranty_claim_manager") {
                    displayWarrantyData(calibratedDataCache);
                } else {
                    // Assume any other role sees the calibration data view
                    displayCalibrationData(calibratedDataCache);
                }

            } catch (error) {
                dataDiv.innerHTML = `<div class="status-message status-error">❌ Error loading data: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Load Data';
            }
        });

                /**
         * Displays data in a table format for the 'warranty_claim_manager' role.
         */
        function displayWarrantyData(data) {
            const container = document.getElementById('calibratedData');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>No warranty data found</p></div>';
                return;
            }

            // Define the specific columns for the warranty view
            const keysToShow = [
                'warranty_claim_no',
                'supplier_name',
                'po_contract_no',
                'description',
                'qty_rejected',
                'claim_amount',
                'claim_date'
            ];

            // Create user-friendly header names
            const headerDisplayNames = {
                warranty_claim_no: 'Claim No.',
                supplier_name: 'Supplier',
                po_contract_no: 'PO Number',
                description: 'Product Description',
                qty_rejected: 'Qty Rejected',
                claim_amount: 'Claim Amount ($)',
                claim_date: 'Claim Date'
            };

            container.innerHTML = `
                <h3 style="margin: 20px 0;">Warranty Claim Data (${data.length} records)</h3>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                ${keysToShow.map(key => `<th>${headerDisplayNames[key] || key}</th>`).join('')}
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map((row, index) => `
                                <tr>
                                    ${keysToShow.map(key => `<td>${row[key] || 'N/A'}</td>`).join('')}
                                    <td>
                                        <button class="btn btn-danger" onclick="deleteRecord('${getDeleteId(row, index)}')">
                                            🗑️ Delete
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        /**
         * Displays data in a table format for calibration-related roles.
         */
        function displayCalibrationData(data) {
            const container = document.getElementById('calibratedData');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>No calibration data found</p></div>';
                return;
            }

            // Define the specific columns for the calibration view
            const keysToShow = [
                'certificate_number',
                'customer_name',
                'duc_id',
                'duc_make_model',
                'calibration_date',
                'calibration_next_due',
                'approval'
            ];

            // Create user-friendly header names
            const headerDisplayNames = {
                certificate_number: 'Certificate No.',
                customer_name: 'Customer',
                duc_id: 'Device ID',
                duc_make_model: 'Device Model',
                calibration_date: 'Calibration Date',
                calibration_next_due: 'Next Due Date',
                approval: 'Status'
            };

            container.innerHTML = `
                <h3 style="margin: 20px 0;">Calibration Data (${data.length} records)</h3>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                ${keysToShow.map(key => `<th>${headerDisplayNames[key] || key}</th>`).join('')}
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map((row, index) => `
                                <tr>
                                    ${keysToShow.map(key => `<td>${row[key] || 'N/A'}</td>`).join('')}
                                    <td>
                                        <button class="btn btn-danger" onclick="deleteRecord('${getDeleteId(row, index)}')">
                                            🗑️ Delete
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        //     if (!data || data.length === 0) {
        //         container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>No calibrated data found</p></div>';
