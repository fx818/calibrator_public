<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div class="flex flex-col lg:flex-row w-full min-h-screen">
        
        <!-- Branding Section -->
        <div class="hidden lg:flex flex-col items-center justify-center w-full lg:w-1/2 bg-gradient-to-br from-blue-600 to-indigo-700 p-12 text-white">
            <div class="max-w-md text-center">
                 <!-- Icon: Document with a checkmark -->
                <svg class="w-24 h-24 mx-auto mb-6 text-indigo-200" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Zm3.75 11.625a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
                </svg>
                <h1 class="text-4xl font-bold leading-tight mb-4">Streamline Your Workflow</h1>
                <p class="text-lg text-indigo-100">
                    Automatically extract, verify, and manage your certificates with ease. Sign in to get started.
                </p>
            </div>
        </div>

        <!-- Login Form Section -->
        <div class="flex items-center justify-center w-full lg:w-1/2 p-8">
            <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 md:p-12">
                <div class="text-center">
                    <h1 class="text-3xl font-bold text-gray-800 dark:text-white mb-2">Certificate Extractor</h1>
                    
                </div>
                
                <!-- Login Button -->
                <div id="loginSection">
                    <button id="loginBtn" class="w-full flex items-center justify-center gap-3 px-6 py-3 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors duration-300">
                        <!-- NEW Google Logo SVG -->
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path>
                          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
                          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
                          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.574c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
                        </svg>
                        <span>Sign in with Google</span>
                    </button>
                </div>

                <!-- User Info (Hidden by default) -->
                <div id="userInfo" class="hidden text-center">
                    <p class="text-gray-600 dark:text-gray-300">Welcome,</p>
                    <p id="userEmail" class="font-semibold text-lg text-blue-600 dark:text-blue-400 mb-6"></p>
                    
                    <div class="flex flex-col sm:flex-row gap-4">
                        <a href="/static/home.html" class="w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors duration-300 font-semibold">
                            Dashboard
                        </a>
                        <button id="logoutBtn" class="w-full px-6 py-3 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors duration-300">
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script>
document.getElementById("loginBtn").onclick = () => {
    window.location.href = "/login";
};

document.getElementById("logoutBtn").onclick = async () => {
    localStorage.removeItem('userEmail');
    localStorage.removeItem('userRole');
    await fetch("/logout", {
        method: "POST",
        credentials: "include"
    });
    location.reload();
};

async function checkLogin() {
    try {
        const res = await fetch("/me", { credentials: "include" });
        if (res.ok) {
            const data = await res.json();
            if (data.email) {
                // Store user info locally
                localStorage.setItem('userEmail', data.email);
                localStorage.setItem('userRole', data.role);

                // Check if this is the first visit in this session
                if (!sessionStorage.getItem('visitedIndex')) {
                    // Mark as visited
                    sessionStorage.setItem('visitedIndex', 'true');

                    // First-time visit and logged in → redirect to home.html
                    window.location.href = "/static/home.html";
                    return;
                }

                // Not first visit → show user info but stay on index.html
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("userInfo").style.display = "block";
                document.getElementById("userEmail").textContent = data.email;
                return;
            }
        }
    } catch (err) {
        console.error("Error checking login status:", err);
    }

    // Not logged in → show login button
    document.getElementById("loginSection").style.display = "block";
    document.getElementById("userInfo").style.display = "none";
}

checkLogin();
</script>

</body>
</html>
